name: Deploy to Azure Container Apps
# Retrigger: AZURE_RG secret added

on:
  push:
    branches: [main]
    paths-ignore:
      - '.squad/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy foundation (ACR + Environment)
        id: foundation
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/foundation.bicep \
            --parameters environmentName=apex \
            --query "properties.outputs" \
            --output json > foundation-outputs.json

          ACR_LOGIN_SERVER=$(jq -r '.acrLoginServer.value' foundation-outputs.json)
          echo "acrLoginServer=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name $(echo "${{ steps.foundation.outputs.acrLoginServer }}" | cut -d'.' -f1)

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api \
            -t ${{ steps.foundation.outputs.acrLoginServer }}/apex-api:${{ github.sha }} \
            .
          docker push ${{ steps.foundation.outputs.acrLoginServer }}/apex-api:${{ github.sha }}

      - name: Build and push Client image
        run: |
          docker build -f Dockerfile.client \
            -t ${{ steps.foundation.outputs.acrLoginServer }}/apex-client:${{ github.sha }} \
            .
          docker push ${{ steps.foundation.outputs.acrLoginServer }}/apex-client:${{ github.sha }}

      - name: Deploy full infrastructure
        id: infra
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters \
              environmentName=apex \
              imageTag=${{ github.sha }} \
              finnhubApiKey=${{ secrets.FINNHUB_API_KEY }} \
              alphaVantageApiKey="${{ secrets.ALPHA_VANTAGE_MCP_API_KEY || 'not-configured' }}" \
              azureOpenaiApiKey=${{ secrets.AZURE_OPENAI_API_KEY }} \
              azureOpenaiEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              azureOpenaiDeployment=${{ secrets.AZURE_OPENAI_DEPLOYMENT }} \
              azureOpenaiApiVersion=${{ secrets.AZURE_OPENAI_API_VERSION }} \
            --query "properties.outputs" \
            --output json > deploy-outputs.json

      - name: Display deployment URLs
        run: |
          echo "đźš€ Deployment complete!"
          echo "API Internal FQDN: $(jq -r '.apiUrl.value' deploy-outputs.json)"
          echo "Client URL: https://$(jq -r '.clientUrl.value' deploy-outputs.json)"
